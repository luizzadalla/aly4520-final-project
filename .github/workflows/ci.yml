name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:

jobs:
  test-and-sanity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install dvc[s3] pytest flake8

      - name: Configure AWS credentials
        run: |
          mkdir -p ~/.aws
          printf "[default]\naws_access_key_id=%s\naws_secret_access_key=%s\n" \
            "${{ secrets.AWS_ACCESS_KEY_ID }}" \
            "${{ secrets.AWS_SECRET_ACCESS_KEY }}" > ~/.aws/credentials
          printf "[default]\nregion=%s\noutput=json\n" \
            "${{ secrets.AWS_DEFAULT_REGION }}" > ~/.aws/config

      - name: Pull DVC artifacts
        run: dvc pull

      - name: Lint
        run: flake8 src inference tests --max-line-length=100

      - name: Run tests
        run: pytest -q

      - name: Sanity pipeline run
        run: |
          python src/data_ingest.py
          python src/data_validation.py
          python src/train_and_tune.py
          python src/evaluate.py
stages:
  data_ingest:
    cmd: python src/data_ingest.py
    deps:
    - data/raw/cardio_train.csv
    - src/data_ingest.py
    outs:
    - data/staged/data.csv
  data_validation:
    cmd: python src/data_validation.py
    deps:
    - data/staged/data.csv
    - src/data_validation.py
    outs:
    - reports/validation_report.json
  train_and_tune:
    cmd: python src/train_and_tune.py
    deps:
    - data/staged/data.csv
    - src/train_and_tune.py
    outs:
    - models/model.pkl
    - models/train_results.json
  evaluate:
    cmd: python src/evaluate.py
    deps:
    - data/staged/data.csv
    - models/model.pkl
    - src/evaluate.py
    outs:
    - reports/evaluation_report.json
